<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #0f172a; color: #fff; }
    .header { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #22d3ee; }
    .status { padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; text-align: center; }
    .status.loading { background: #1e293b; color: #94a3b8; }
    .status.safe { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
    .status.danger { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
    .footer { font-size: 0.75rem; color: #64748b; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 10px; }
  </style>
</head>
<body>
  <div class="header">🛡️ CyberPhish AI</div>
  <div id="url" style="font-size: 0.8rem; word-break: break-all; color: #94a3b8;">Scanning page...</div>
  <div id="status" class="status loading">Analyzing Threat Level...</div>
  <div class="footer">Real-time protection by PhishViz</div>
  <script src="popup.js"></script>
</body>
</html>
